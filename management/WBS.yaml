- id: DENWA-WBS-005
  vti_backlog_id: ITEC_DENWA_APP-141
  type: 依存関係
  title: セキュリティ確認とソースレビュー準備
  description: セキュリティ確認済み項目を整理し、関連資料を準備します。あわせて、日本側でソースコードをレビューできるように、Source CodeまたはGitLabアクセス提供の準備を進めます。
  owner: VTI_SAM
  start_date: '2026-05-26'
  end_date: ''
  deadline: '2026-05-27'
  status: Completed
  priority: High
  definition_of_done: 'セキュリティ項目の資料が完成していること。お客様からグローバルIPを受領後、VTI側でIPをホワイトリスト登録し、担当者宛にGitLabアクセス申請メールを送ること。

    [Secrets Manager完了基準]:

    1. Secrets Manager上にJSON形式の認証情報を含む単一のシークレットを作成すること。

    2. ECS Task Definition Container (Spring Boot)を、シークレットから環境変数へキーをマッピングするように設定すること（secrets: [{name, valueFrom}]を使用）。

    3. Spring Bootコードが@Valueを介して環境変数を使用していること。

    4. コンテナのentrypoint/startupコードが、base64エンコードされたAPNS/SSL Keystore (.p8/.p12)を対応する物理ファイルにデコードしていること。'
  notes: 鈴木 克成様へ連絡し、片山 剛様をCCに入れてグローバルIPの提供を依頼済みです。VTIのGitLabはローカルサーバーで運用しているため、アクセス付与前にIPのホワイトリスト登録が必要です。現在、お客様からの回答待ちです。
  notes_vi: Tổng hợp hạng mục bảo mật và chuẩn bị cung cấp Source Code/Git access cho phía Nhật rà soát
