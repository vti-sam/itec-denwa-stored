  title: WEB側のセキュリティ指摘事項の検証
  description: 'セキュリティレポートに基づき、Staging環境のAdmin Portalにおける以下の10項目のセキュリティリスクを評価・検証する：

    1. ブルートフォース攻撃およびアカウントロックアウト機能の検証。

    2. ログインフォームにおけるSQLインジェクションの検証。

    3. 動的スキーマ名（"${schemaName}"）によるSQLインジェクションリスクの検証。

    4. HTTPセキュリティヘッダー（CSP, X-Frame-Options, HSTS等）の検証。

    5. Admin PortalにおけるXSS（クロスサイトスクリプティング）の検証。

    6. CSRF（クロスサイトリクエストフォージェリ）脆弱性の検証。

    7. JWT/トークン保存方式およびCookie属性（HttpOnly, Secure, SameSite）の検証。

    8. Staging環境の公開範囲およびIPホワイトリスト制御（X-Forwarded-For偽装等）の検証。

    9. API認可制御およびIDOR（不適切なオブジェクト参照）の検証。

    10. 検証結果、エビデンス（PoC、リクエスト/レスポンス）の取りまとめおよびレポートの再分類。'
  owner: VTI_SAM
  start_date: '2026-06-08'
  end_date: ''
  deadline: '2026-06-19'
  status: Completed
  priority: High
  definition_of_done: 'WEB側のセキュリティに対する10項目の指摘について、検証と確認は完了しています。

    検証結果とエビデンスもレポートとして整理済みです'
  notes: '成果物：


    Security'
